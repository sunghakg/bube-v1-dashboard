<text x="82" y="1060" font-size="17" font-family="monospace" fill="#e8eef6">k = 0.60 × clip( 20 / VIX , 0.5 , 2.0 )</text>
<text x="82" y="1090" font-size="17" font-family="monospace" fill="#e8eef6">alloc = min( k × 엔진비중 , 1.0 )</text>
<text x="82" y="1122" font-size="14" fill="#4cc9f0">VIX↑ (공포) → 비중↓   ·   VIX↓ (안정) → 비중↑</text>
<text x="82" y="1144" font-size="13" fill="#9fb0c3">margin 0% — 최대 100% 현금 한도, broker 강제청산 원천 차단</text>
